<!DOCTYPE html>
<html>
<head>
  <title>Retro Desktop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="desktop">
    <div class="icon">
      <div class="emoji">💻</div>
      <p>My Computer</p>
    </div>

    <div class="icon" onclick="openDocuments()">
      <div class="emoji">📁</div>
      <p>My Documents</p>
    </div>

    <div class="icon">
      <div class="emoji">🌐</div>
      <p>Net 1</p>
    </div>

    <div class="icon">
      <div class="emoji">🗑️</div>
      <p>Recycle Bin</p>
    </div>
  </div>

<div id="documentsWindow" class="window">
  <div class="window-title">
    <span>📁 My Documents</span>
    <button onclick="closeDocuments()">X</button>
  </div>

  <div class="menu">File &nbsp; Edit &nbsp; View &nbsp; Help</div>

  <div class="toolbar">
    <div class="tool">⬅️<br>Back</div>
    <div class="tool">➡️<br>Forward</div>
    <div class="tool">⬆️<br>Up</div>
    <div class="tool">✂️<br>Cut</div>
    <div class="tool">📄<br>Copy</div>
    <div class="tool">📋<br>Paste</div>
  </div>

  <div class="address">
    <span>Address</span>
    <div class="address-box">C:\My Documents</div>
  </div>

  <div class="files">
    <div class="file-icon">📁<br>Music</div>
    <div class="file-icon">📁<br>Videos</div>
    <div class="file-icon">📁<br>Photos</div>
    <div class="file-icon">📁<br>Secret</div>
    <div class="file-icon">📄<br>No1.doc</div>
  </div>

  <div class="status-bar">
    <div class="status-left">5 items</div>
    <div class= "status-left">Documentation</div>
  </div>
</div>

  <script>
    function openDocuments() {
      document.getElementById("documentsWindow").style.display = "block";
    }

    function closeDocuments() {
      document.getElementById("documentsWindow").style.display = "none";
    }
  </script>

</body>
</html>
